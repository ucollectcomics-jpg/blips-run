<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Blip's Run</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#16003d;
width:100%;
height:100%;
font-family:Arial,Helvetica,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
}

#gameWrap{
position:relative;
width:100vw;
height:56.25vw;
max-height:100vh;
max-width:177.78vh;
overflow:hidden;
background:#16003d;
}

canvas{
display:block;
width:100%;
height:100%;
background:#6421e8;
}

#startTip{
position:absolute;
top:12px;
left:50%;
transform:translateX(-50%);
z-index:5;
color:white;
background:rgba(0,0,0,.55);
border:2px solid #99ff00;
border-radius:16px;
padding:8px 14px;
font-size:16px;
text-align:center;
}

@media(max-width:900px){
#startTip{
font-size:12px;
padding:6px 10px;
}
}
</style>
</head>

<body>

<div id="gameWrap">

<div id="startTip">
Use keyboard arrows: Right = run • Up = jump • Down = duck • Collect stars for +10 life
</div>

<canvas id="game"></canvas>

</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resizeGame(){
canvas.width=1280;
canvas.height=720;
}

resizeGame();
window.addEventListener("resize",resizeGame);

document.addEventListener("keydown",function(e){
if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)){
e.preventDefault();
}
},{passive:false});

/* KEEP THE REST OF YOUR ORIGINAL GAME CODE BELOW THIS LINE */

</script>

</body>
</html>
