
<!-- BLIP'S RUN INTRO -->
<div id="introScreen">
<img src="blips_run_logo.png" class="logo">
<div class="loadingBox"><div id="loadingBar"></div></div>
<div class="loadingText">Loading...</div>
</div>

<style>
#introScreen{position:fixed;inset:0;background:#180038;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:99999}
.logo{width:min(80%,700px)}
.loadingBox{width:min(60%,600px);height:30px;border:3px solid #9cff00;border-radius:20px;overflow:hidden;background:#2b004d}
#loadingBar{width:0;height:100%;background:#ff174d}
.loadingText{margin-top:15px;color:#fff;font-size:24px;font-weight:bold}
</style>

<script>
let p=0;
const t=setInterval(()=>{
 p++;
 document.getElementById('loadingBar').style.width=p+'%';
 if(p>=100){
  clearInterval(t);
  document.getElementById('introScreen').remove();
 }
},30);
</script>
