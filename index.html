<div style="width:100%;max-width:1280px;margin:auto;text-align:center;">

  <div style="width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:20px;">
    <iframe
      id="blipsGame"
      src="https://ucollectcomics-jpg.github.io/blips-run/"
      style="width:100%;height:100%;border:none;display:block;"
      allow="autoplay; fullscreen"
      scrolling="no">
    </iframe>
  </div>

  <div id="mobileGameControls" style="display:none;margin-top:15px;">
    <button onclick="sendGameControl('up')" style="width:80px;height:80px;font-size:36px;border-radius:20px;background:#6d00ff;color:white;border:3px solid #99ff00;">▲</button>
    <br><br>
    <button onclick="sendGameControl('left')" style="width:80px;height:80px;font-size:36px;border-radius:20px;background:#6d00ff;color:white;border:3px solid #99ff00;">◀</button>
    <button onclick="sendGameControl('down')" style="width:80px;height:80px;font-size:36px;border-radius:20px;background:#6d00ff;color:white;border:3px solid #99ff00;">▼</button>
    <button onclick="sendGameControl('right')" style="width:80px;height:80px;font-size:36px;border-radius:20px;background:#6d00ff;color:white;border:3px solid #99ff00;">▶</button>
  </div>

</div>

<script>
function sendGameControl(action){
  const game = document.getElementById("blipsGame");
  game.focus();
  game.contentWindow.postMessage(action, "*");
}

document.addEventListener("keydown", function(e){
  const keys = ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "];

  if(keys.includes(e.key)){
    e.preventDefault();
    e.stopPropagation();

    if(e.key === "ArrowUp") sendGameControl("up");
    if(e.key === "ArrowDown") sendGameControl("down");
    if(e.key === "ArrowLeft") sendGameControl("left");
    if(e.key === "ArrowRight") sendGameControl("right");
    if(e.key === " ") sendGameControl("space");
  }
}, true);

function showPhoneControlsOnly(){
  const isPhone = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
  document.getElementById("mobileGameControls").style.display = isPhone ? "block" : "none";
}

showPhoneControlsOnly();
window.addEventListener("resize", showPhoneControlsOnly);
</script>
